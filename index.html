    <style>
        :root {
            --card-width: 140px;
            --card-height: 220px;
            --card-width-sm: 100px;
            --card-height-sm: 160px;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
        }

        h1, h2, h3, .tarot-font {
            font-family: 'Cinzel', serif;
        }

        /* Card Styles */
        .tarot-card {
            width: var(--card-width);
            height: var(--card-height);
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .tarot-card {
                width: var(--card-width-sm);
                height: var(--card-height-sm);
            }
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-content.reversed {
            transform: rotate(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #fbbf24;
        }

        .card-back {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fbbf24' fill-opacity='0.1' fill-rule='evenodd'%3E%3Ccircle cx='3' cy='3' r='3'/%3E%3Ccircle cx='13' cy='13' r='3'/%3E%3C/g%3E%3C/svg%3E");
        }

        .card-front {
            background: #f1f5f9;
            color: #1e293b;
            transform: rotateY(180deg);
            padding: 10px;
            overflow: hidden;
        }

        .card-front.major { border-color: #a855f7; background: #faf5ff; }
        .card-front.wands { border-color: #ef4444; background: #fef2f2; }
        .card-front.cups { border-color: #3b82f6; background: #eff6ff; }
        .card-front.swords { border-color: #eab308; background: #fefce8; }
        .card-front.pentacles { border-color: #22c55e; background: #f0fdf4; }

        /* Spread Layouts */
        .spread-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            min-height: 400px;
        }

        /* Celtic Cross Grid */
        .celtic-cross-grid {
            display: grid;
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        }

       @media (min-width: 1024px) {
            .celtic-cross-grid {
                grid-template-columns: repeat(6, 1fr);
                grid-template-rows: repeat(6, 1fr);
                height: auto;
                min-height: 700px;
            }
            .pos-1 { grid-column: 2 / 4; grid-row: 2 / 3; justify-self: center; z-index: 1; }
            .pos-2 { grid-column: 2 / 4; grid-row: 2 / 3; justify-self: center; z-index: 2; transform: rotate(90deg) !important; opacity: 0.9; }
            .pos-3 { grid-column: 2 / 4; grid-row: 3 / 4; justify-self: center; }
            .pos-4 { grid-column: 1 / 2; grid-row: 2 / 3; justify-self: end; padding-right: 10px;}
            .pos-5 { grid-column: 2 / 4; grid-row: 1 / 2; justify-self: center; }
            .pos-6 { grid-column: 4 / 5; grid-row: 2 / 3; justify-self: start; padding-left: 10px;}
            .pos-7 { grid-column: 2; grid-row: 5; }
            .pos-8 { grid-column: 3; grid-row: 5; }
            .pos-9 { grid-column: 4; grid-row: 5; }
            .pos-10 { grid-column: 5; grid-row: 5; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .suit-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 8px;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 4px; }
    </style>

              { "id": "swords-11", "rank": "Knight", "name": "Knight of Swords", "upright": "Intellectual, communication, logic, truth-seeking", "reversed": "Aggressive, deceptive, manipulative, argumentative", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "swords-12", "rank": "Queen", "name": "Queen of Swords", "upright": "Intellect, independence, logic, perception, grace, protection", "reversed": "Cold, bitter, manipulative, harsh, judgmental", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "swords-13", "rank": "King", "name": "King of Swords", "upright": "Intellectual, authority, truth, logic, analytical, wisdom", "reversed": "Cruel, aggressive, harsh, cold", "yn_upright": "Yes", "yn_reversed": "No" }
            ],
            "pentacles": [
              { "id": "pentacles-0", "rank": "Ace", "name": "Ace of Pentacles", "upright": "New opportunity, prosperity, abundance, good fortune, fresh start", "reversed": "Lost opportunity, lack of resources, scarcity, over spending, financial disarray", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-1", "rank": "Two", "name": "Two of Pentacles", "upright": "Balance, adaptability, time management, prioritization", "reversed": "Imbalance, lack of adaptability, disorganization", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-2", "rank": "Three", "name": "Three of Pentacles", "upright": "Teamwork, collaboration, learning, building, craftsmanship", "reversed": "Lack of collaboration, lack of teamwork, disharmony", "yn_upright": "Yes", "yn_reversed": "No, you should watch out someone around you" },
              { "id": "pentacles-3", "rank": "Four", "name": "Four of Pentacles", "upright": "Conservation, control, possessiveness, materialism, stinginess", "reversed": "Letting go, sharing, generosity, release, gambling, risk-taking", "yn_upright": "No", "yn_reversed": "Yes" },
              { "id": "pentacles-4", "rank": "Five", "name": "Five of Pentacles", "upright": "Financial hardship, poverty, lack of support, abandonment, unemployment", "reversed": "Recovery, assistance, abundance, acceptance, paid debts", "yn_upright": "No", "yn_reversed": "Yes" },
              { "id": "pentacles-5", "rank": "Six", "name": "Six of Pentacles", "upright": "Generosity, rewards, charity, sharing, fairness, gratitude", "reversed": "Stinginess, lack of generosity, inequality, abuse of power, greed", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-6", "rank": "Seven", "name": "Seven of Pentacles", "upright": "Perseverance, rewarded investment, paid hard work, growth, patience", "reversed": "Shortsightedness, lack of growth, lack of investment, limited results", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-7", "rank": "Eight", "name": "Eight of Pentacles", "upright": "Skill, craftmanship, expertise, apprenticeship, attention to detail, your work will pay off", "reversed": "Lack of skill, lack of focus, inefficiency", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-8", "rank": "Nine", "name": "Nine of Pentacles", "upright": "Abundance, prosperity, luxury, independence, confidence", "reversed": "Loss of freedom, lack of independence, insecurity, scam, false success", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-9", "rank": "Ten", "name": "Ten of Pentacles", "upright": "Wealth, family, inheritance, legacy, abundance, financial stability", "reversed": "Loss, lack of closure, family conflict", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-10", "rank": "Page", "name": "Page of Pentacles", "upright": "Ambition, desire to learn, reading, scholarship, aptitude, manifestation, new job, new opportunity", "reversed": "Lack of direction, lack of motivation, impatience, immaturity, procrastination", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-11", "rank": "Knight", "name": "Knight of Pentacles", "upright": "Reliability, hard work, tradition, responsibility, loyalty, efficiency", "reversed": "Unreliability, lack of growth, procrastination, irresponsibility, laziness", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-12", "rank": "Queen", "name": "Queen of Pentacles", "upright": "Practicality, creature comforts, nurturing, independence", "reversed": "Lack of nurturing, lack of independence, insecurity, manipulation", "yn_upright": "Yes", "yn_reversed": "No" },
              { "id": "pentacles-13", "rank": "King", "name": "King of Pentacles", "upright": "Abundance, prosperity, security, leadership, authority", "reversed": "Lack of abundance, lack of security, unworthiness, corruption, greed", "yn_upright": "Yes", "yn_reversed": "No" }
            ]
          }
        };

        let fullDeck = [];

        function toRoman(num) {
            const romans = ["0", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII", "XIII", "XIV", "XV", "XVI", "XVII", "XVIII", "XIX", "XX", "XXI"];
            return romans[num];
        }

        function loadCards() {
            const majorArcana = tarotData.majorArcana.map(card => ({
                ...card,
                type: 'Major',
                roman: toRoman(card.number),
                suit: 'Major',
                number: card.number
            }));

            const minorArcana = [
                ...tarotData.minorArcana.wands.map(card => ({ ...card, type: 'Minor', suit: 'Wands', number: card.rank })),
                ...tarotData.minorArcana.cups.map(card => ({ ...card, type: 'Minor', suit: 'Cups', number: card.rank })),
                ...tarotData.minorArcana.swords.map(card => ({ ...card, type: 'Minor', suit: 'Swords', number: card.rank })),
                ...tarotData.minorArcana.pentacles.map(card => ({ ...card, type: 'Minor', suit: 'Pentacles', number: card.rank }))
            ];

            fullDeck = [...majorArcana, ...minorArcana];
            console.log('Cards loaded from embedded data:', fullDeck.length);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCards();
        });

        const spreads = {
            1: [
                { name: "Daily Insight", desc: "The energy surrounding you today." }
            ],
            3: [
                { name: "The Past", desc: "Influences from the past that still affect the situation." },
                { name: "The Present", desc: "The current state of affairs and immediate challenges." },
                { name: "The Future", desc: "The likely outcome if the current path is followed." }
            ],
            10: [
                { name: "The Present", desc: "The heart of the matter." },
                { name: "The Challenge", desc: "The obstacle crossing you (Upright or Reversed)." },
                { name: "The Foundation", desc: "Subconscious influences or the root of the issue." },
                { name: "The Past", desc: "Recent events that are passing away." },
                { name: "The Crown", desc: "Your conscious goals and best potential outcome." },
                { name: "The Future", desc: "Immediate future events." },
                { name: "Self", desc: "Your attitude and stance towards the issue." },
                { name: "Environment", desc: "How others see you or external influences." },
                { name: "Hopes & Fears", desc: "Inner psychological state regarding the outcome." },
                { name: "Outcome", desc: "The culmination of the reading." }
            ]
        };

        function shuffle(array) {
            let currentIndex = array.length,  randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [
                    array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        async function drawCards() {
            if (!fullDeck || fullDeck.length === 0) {
                loadCards();
            }

            const spreadType = parseInt(document.getElementById('spread-select').value);
            const spreadArea = document.getElementById('spread-area');
            const cardsContainer = document.getElementById('cards-container');
            const loading = document.getElementById('loading');
            const readingArea = document.getElementById('reading-area');
            const readingContent = document.getElementById('reading-content');

            cardsContainer.innerHTML = '';
            readingArea.classList.add('hidden');
            readingContent.innerHTML = '';
            loading.classList.remove('hidden');

            await new Promise(r => setTimeout(r, 600));
            loading.classList.add('hidden');

            let deck = shuffle([...fullDeck]);
            let drawn = [];

            if (spreadType === 10) {
                spreadArea.className = 'celtic-cross-grid fade-in';
            } else {
                spreadArea.className = 'spread-container fade-in';
            }

            for(let i=0; i<spreadType; i++) {
                let card = deck.pop();
                let isReversed = Math.random() < 0.5;
                drawn.push({ ...card, isReversed, positionName: spreads[spreadType][i].name, positionDesc: spreads[spreadType][i].desc });

                const cardEl = createCardElement(card, isReversed, i, spreadType, spreads[spreadType][i].name);
                cardsContainer.appendChild(cardEl);

                const readingItem = document.createElement('div');
                readingItem.className = 'bg-slate-800 p-4 rounded border border-slate-700 hover:border-amber-500 transition-colors';
                readingItem.innerHTML = `
                    <h3 class="text-amber-400 font-bold mb-1">${i+1}. ${spreads[spreadType][i].name}</h3>
                    <p class="text-slate-400 text-sm mb-2 italic">${spreads[spreadType][i].desc}</p>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="font-bold text-lg text-slate-200">${card.name}</span>
                        <span class="text-xs px-2 py-0.5 rounded ${isReversed ? 'bg-red-900 text-red-200' : 'bg-green-900 text-green-200'}">
                            ${isReversed ? 'Reversed' : 'Upright'}
                        </span>
                    </div>
                    <p class="text-sm text-slate-300">
                        ${getCardMeaning(card, isReversed)}
                    </p>
                    <p class="text-xs font-bold text-amber-400 mt-1">
                        Yes or No: ${isReversed ? (card.yn_reversed || 'N/A') : (card.yn_upright || 'N/A')}
                    </p>
                `;
                readingContent.appendChild(readingItem);
            }

            readingArea.classList.remove('hidden');
            lucide.createIcons();
            spreadArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function createCardElement(card, isReversed, index, spreadType, positionLabel) {
            const wrapper = document.createElement('div');
            if (spreadType === 10) {
                wrapper.classList.add(`pos-${index+1}`);
            }

            wrapper.className += ` tarot-card group relative`;

            const label = document.createElement('div');
            label.className = "absolute -top-8 left-0 right-0 text-center text-xs text-amber-400 font-bold opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap z-10 pointer-events-none";
            label.innerText = `${index+1}. ${positionLabel}`;
            wrapper.appendChild(label);

            const inner = document.createElement('div');
            inner.className = 'card-inner';

            const back = document.createElement('div');
            back.className = 'card-face card-back';
            back.innerHTML = `<div class="w-12 h-12 border-2 border-amber-400/30 rounded-full flex items-center justify-center"><div class="w-8 h-8 border border-amber-400/50 rotate-45"></div></div>`;

            const front = document.createElement('div');
            let suitClass = card.suit.toLowerCase();
            if(card.type === 'Major') suitClass = 'major';

            front.className = `card-face card-front ${suitClass}`;

            const content = document.createElement('div');
            content.className = `card-content flex flex-col items-center justify-between h-full w-full py-2 ${isReversed ? 'reversed' : ''}`;

            const topNum = document.createElement('div');
            topNum.className = "text-sm font-bold opacity-70";
            topNum.innerText = card.roman ? card.roman : card.number;

            const iconDiv = document.createElement('div');
            iconDiv.innerHTML = `<i data-lucide="${getIconName(card.suit)}" class="w-12 h-12 stroke-[1.5]"></i>`;
            if (card.type === 'Major') iconDiv.innerHTML = `<i data-lucide="crown" class="w-12 h-12 stroke-[1.5] text-purple-600"></i>`;

            const nameDiv = document.createElement('div');
            nameDiv.className = "tarot-font text-center font-bold text-sm leading-tight";
            nameDiv.innerText = card.name;

            content.appendChild(topNum);
            content.appendChild(iconDiv);
            content.appendChild(nameDiv);

            front.appendChild(content);
            inner.appendChild(back);
            inner.appendChild(front);
            wrapper.appendChild(inner);

            setTimeout(() => {
                inner.classList.add('is-flipped');
            }, 100 + (index * 200));

            return wrapper;
        }

        function getIconName(suit) {
            const normalizedSuit = suit ? suit.charAt(0).toUpperCase() + suit.slice(1).toLowerCase() : '';
            switch(normalizedSuit) {
                case 'Wands': return 'flame';
                case 'Cups': return 'glass-water';
                case 'Swords': return 'sword';
                case 'Pentacles': return 'circle-dashed';
                default: return 'star';
            }
        }

        function getCardMeaning(card, isReversed) {
            if (!card) return '';
            return isReversed ? card.reversed : card.upright;
        }

        lucide.createIcons();
    </script>
</body>
</html>
